# .github/workflows/review.yaml
name: AI Code Review

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# pull-requests:write lets the agent post its review back onto the PR.
permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/code-reviewer
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history so the base ref is available for the diff

      - name: Configure node
        uses: actions/setup-node@v5
        with:
          node-version: '24' # code-reviewer relies on import.meta.main (Node 24)

      - name: Install dependencies
        run: npm ci

      - name: Run agent
        id: review
        # Capture the agent output instead of letting a non-zero exit abort the
        # job — we want to post the findings as a PR comment first, then fail.
        run: |
          set +e
          npm start 2>&1 | tee review-output.txt
          echo "exit=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DIFF_BASE: origin/${{ github.base_ref || github.event.repository.default_branch }}

      - name: Post review as PR comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "## 🤖 AI Code Review"
            echo ""
            echo '```'
            cat review-output.txt
            echo '```'
          } > comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file comment.md

      - name: Enforce review verdict
        if: always()
        # A critical finding (surviving escalation) makes the agent exit 1.
        run: exit ${{ steps.review.outputs.exit }}
